
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Прогрес-бар</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: white;
}

.progress-container {
    width: 400px;
    height: 80px;
    border: 5px solid orange;
    position: relative;
    overflow: hidden;
    background: white;
}

.progress-bar {
    width: 100px;
    height: 100%;
    background: orange;
    position: absolute;
    animation: move 2s linear infinite;
}

@keyframes move {
    0% {
        left: -100px;
    }
    100% {
        left: 100%;
    }
}
</style>

</head>
<body>

<div class="progress-container">
    <div class="progress-bar"></div>
</div>

</body>
</html>
