<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .button-container {
            background-color: crimson;
            color: black;
            text-align: center;
            padding: 5px;
            border-radius: 15px;
            width: 100px;
        }
        .link-button {
            color: black;
            text-decoration: none;
            font-family: Arial, Helvetica, sans-serif;
        }
        button {
            background-color: crimson;
            color: black;
            text-align: center;
            padding: 5px;
            border-radius: 15px;
            border: none;
            width: 100px;
            margin: 5px auto;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1em;
            transition: all 0.8s ease 3s;
            transform: scale(115%);
        }

        button:hover {
            background-color: chocolate;
            color: cornflowerblue;
        }

        .example {
            width: 100px;
            height: 100px;
            background-color: black;
            transition: all 0.7s ease 0s;
        }

        .translate:hover {
            transform: translate(25px, 20px);
        }
        .scale:hover {
            transform: scale(105%);
        }


    </style>
</head>
<body>
    <p>
        <a href="https://uk.wikipedia.org/wiki/%D0%93%D0%BE%D0%BB%D0%BE%D0%B2%D0%BD%D0%B0_%D1%81%D1%82%D0%BE%D1%80%D1%96%D0%BD%D0%BA%D0%B0">Гіперпосилання</a>
        - це елемент html-сторінки, що перенаправляє на інший ресурс по посиланню.
    </p>

    <div class="example translate"></div>

    <button>Натисни!</button>

    <div class="button-container">
        <a href="#" class="link-button">Натисни</a>
    </div>

</body>
</html>
